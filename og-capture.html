<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin:0; padding:0; box-sizing:border-box; }
html { background:#1C2B3A; }
body { width:1200px; height:630px; overflow:hidden; background:#1C2B3A; }
.og {
  width:1200px;
  height:630px;
  background:#1C2B3A;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  position:relative;
  overflow:hidden;
}
.circle1 {
  position:absolute;
  top:-180px; right:-180px;
  width:520px; height:520px;
  border-radius:50%;
  background:rgba(232,121,12,0.08);
}
.circle2 {
  position:absolute;
  bottom:-120px; left:-120px;
  width:400px; height:400px;
  border-radius:50%;
  background:rgba(232,121,12,0.05);
}
.inner { display:flex; flex-direction:column; align-items:center; z-index:1; gap:0; }

/* 메인 타이틀 - 가장 크게 */
.main-title {
  font-family:'Malgun Gothic', 'Apple SD Gothic Neo', Arial, sans-serif;
  font-size:80px;
  font-weight:900;
  color:#FFFFFF;
  letter-spacing:-1px;
  line-height:1.1;
  text-align:center;
  margin-bottom:32px;
}

/* 서브 타이틀 - 두 번째로 크게 */
.sub-title {
  font-family:'Malgun Gothic', 'Apple SD Gothic Neo', Arial, sans-serif;
  font-size:38px;
  font-weight:500;
  color:rgba(255,255,255,0.75);
  letter-spacing:0.5px;
  text-align:center;
  margin-bottom:52px;
}

/* 구분선 */
.divider {
  width:48px; height:2px;
  background:#E8790C;
  opacity:0.7;
  margin-bottom:36px;
}

/* 브랜드명 - 하단에 작게 */
.brand {
  display:flex;
  align-items:baseline;
  gap:12px;
}
.brand-ko {
  font-family:'Malgun Gothic', 'Apple SD Gothic Neo', Arial, sans-serif;
  font-size:24px;
  font-weight:700;
  color:rgba(255,255,255,0.45);
  letter-spacing:4px;
}
.brand-dot {
  width:4px; height:4px;
  border-radius:50%;
  background:#E8790C;
  opacity:0.6;
  margin-bottom:2px;
}
.brand-en {
  font-family:'Arial Black', Arial, sans-serif;
  font-size:20px;
  font-weight:900;
  letter-spacing:5px;
}
.brand-en .white { color:rgba(255,255,255,0.3); }
.brand-en .orange { color:#E8790C; opacity:0.7; }

.domain {
  position:absolute;
  bottom:28px; right:44px;
  font-family:Arial, sans-serif;
  font-size:16px;
  color:rgba(255,255,255,0.2);
  letter-spacing:1px;
}
</style>
</head>
<body>
<div class="og">
  <div class="circle1"></div>
  <div class="circle2"></div>
  <div class="inner">
    <div class="main-title">프랜차이즈 점주 전용 커뮤니티</div>
    <div class="sub-title">혼자 고민하지 마세요. 같은 처지끼리.</div>
    <div class="divider"></div>
    <div class="brand">
      <span class="brand-ko">언더커버</span>
      <div class="brand-dot"></div>
      <span class="brand-en"><span class="white">UNDER</span><span class="orange">COVER</span></span>
    </div>
  </div>
  <div class="domain">undercov.kr</div>
</div>
</body>
</html>
