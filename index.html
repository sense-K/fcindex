<script>
// ===== Supabase 설정 =====
// 아래 두 값을 Supabase 프로젝트에서 복사해서 넣어주세요
const SUPABASE_URL = 'https://vogyfomyhrvqswivqhdv.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZvZ3lmb215aHJ2cXN3aXZxaGR2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5Nzk5MTYsImV4cCI6MjA4OTU1NTkxNn0.fnIngu1hKe-ahNz1uCC_Rv-U1wqkNxE_SZ1-VqY9QJ0';
const ADMIN_EMAIL = 'zzabhm@gmail.com'; // 어드민 이메일

const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

// ===== 전역 상태 =====
let currentUser = null;
let currentProfile = null;
let currentBrand = null;
let selectedStoreData = null;
let existingDataId = null;

// ===== 초기화 =====
async function init() {
  const { data: { session } } = await sb.auth.getSession();
  if (session) {
    currentUser = session.user;
    await loadProfile();
    if (currentProfile?.auth_status === 'approved') {
      showPage(currentUser.email === ADMIN_EMAIL ? 'admin' : 'home');
    } else {
      showPage('mypage');
    }
  } else {
    showPage('landing');
  }
  document.getElementById('loading').classList.add('hidden');
  document.getElementById('app').classList.remove('hidden');

  // 브랜드 목록 로드
  loadBrands();
}

// ===== 프로필 로드 =====
async function loadProfile() {
  const { data } = await sb.from('profiles')
    .select('*, brands(name, avg_labor_rate, avg_material_rate, avg_rent_rate, avg_delivery_rate, avg_utility_rate, avg_royalty_rate, avg_other_rate, avg_net_profit_rate)')
    .eq('id', currentUser.id).single();
  currentProfile = data;
  currentBrand = data?.brands;
}

// ===== 브랜드 로드 =====
async function loadBrands() {
  const { data } = await sb.from('brands').select('id, name').order('name');
  const sel = document.getElementById('su-brand');
  if (data) {
    data.forEach(b => {
      const opt = document.createElement('option');
      opt.value = b.id;
      opt.textContent = b.name;
      sel.appendChild(opt);
    });
  }
}

// ===== 페이지 전환 =====
function showPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  const pg = document.getElementById('page-' + name);
  if (pg) {
    pg.classList.add('active');
    window.scrollTo(0, 0);
  }
  if (name === 'home') loadHome();
  if (name === 'mypage') loadMypage();
  if (name === 'store-data') loadStoreDataPage();
  if (name === 'community') loadCommunity();
  if (name === 'admin') loadAdmin();
}

// ===== 로그인 =====
async function doLogin() {
  const email = document.getElementById('login-email').value.trim();
  const pw = document.getElementById('login-pw').value;
  if (!email || !pw) return showAlert('login-alert', '이메일과 비밀번호를 입력해주세요.', 'error');

  const { error } = await sb.auth.signInWithPassword({ email, password: pw });
  if (error) return showAlert('login-alert', '이메일 또는 비밀번호가 틀렸어요.', 'error');

  const { data: { user } } = await sb.auth.getUser();
  currentUser = user;
  await loadProfile();

  if (currentUser.email === ADMIN_EMAIL) return showPage('admin');
  if (currentProfile?.auth_status === 'approved') showPage('home');
  else showPage('mypage');
}

// ===== 회원가입 =====
async function doSignup() {
  const email = document.getElementById('su-email').value.trim();
  const nick = document.getElementById('su-nick').value.trim();
  const pw = document.getElementById('su-pw').value;
  const pw2 = document.getElementById('su-pw2').value;
  const biz = document.getElementById('su-biz').value.trim();
  const brandId = document.getElementById('su-brand').value;
  const file = document.getElementById('su-biz-img').files[0];

  if (!email||!nick||!pw||!biz||!brandId||!file) return showAlert('signup-alert','모든 항목을 입력해주세요.','error');
  if (pw !== pw2) return showAlert('signup-alert','비밀번호가 일치하지 않아요.','error');
  if (pw.length < 6) return showAlert('signup-alert','비밀번호는 6자 이상이어야 해요.','error');

  // 이미지 업로드
  const ext = file.name.split('.').pop();
  const filePath = `biz/${Date.now()}.${ext}`;
  const { error: upErr } = await sb.storage.from('biz-images').upload(filePath, file);
  if (upErr) return showAlert('signup-alert','이미지 업로드에 실패했어요.','error');

  const { data: urlData } = sb.storage.from('biz-images').getPublicUrl(filePath);
  const bizImageUrl = urlData.publicUrl;

  // 회원가입
  const { data: authData, error: authErr } = await sb.auth.signUp({ email, password: pw });
  if (authErr) return showAlert('signup-alert', authErr.message, 'error');

  // 프로필 저장
  await sb.from('profiles').insert({
    id: authData.user.id,
    email,
    nickname: nick,
    biz_number: biz,
    biz_image: bizImageUrl,
    brand_id: brandId,
    auth_status: 'pending'
  });

  currentUser = authData.user;
  await loadProfile();
  showPage('mypage');
}

// ===== 로그아웃 =====
async function doLogout() {
  await sb.auth.signOut();
  currentUser = null;
  currentProfile = null;
  currentBrand = null;
  showPage('landing');
}

// ===== 홈 로드 =====
async function loadHome() {
  if (!currentProfile) return;
  document.getElementById('home-nickname').textContent = currentProfile.nickname || '-';
  document.getElementById('home-brand-name').textContent = currentBrand?.name || '-';

  const { data } = await sb.from('store_data')
    .select('*').eq('owner_id', currentUser.id)
    .order('data_year', { ascending: true })
    .order('data_month', { ascending: true });

  const tabs = document.getElementById('month-tabs');
  tabs.innerHTML = '';

  if (!data || data.length === 0) {
    document.getElementById('home-data').classList.add('hidden');
    document.getElementById('home-empty').classList.remove('hidden');
    return;
  }

  document.getElementById('home-data').classList.remove('hidden');
  document.getElementById('home-empty').classList.add('hidden');

  // 최근 6개월만
  const recent = data.slice(-6);
  recent.forEach((d, i) => {
    const tab = document.createElement('div');
    tab.className = 'month-tab' + (i === recent.length - 1 ? ' active' : '');
    tab.textContent = d.data_month + '월';
    tab.onclick = () => {
      document.querySelectorAll('.month-tab').forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      renderDashboard(d);
    };
    tabs.appendChild(tab);
  });

  renderDashboard(recent[recent.length - 1]);
}

// ===== 대시보드 렌더링 =====
function renderDashboard(d) {
  selectedStoreData = d;
  const avg = currentBrand;

  document.getElementById('m-revenue').textContent = numFmt(d.revenue);
  document.getElementById('m-net-rate').textContent = pctFmt(d.net_profit_rate);
  document.getElementById('m-net-amt').textContent = '= ' + numFmt(d.net_profit) + '원';
  document.getElementById('m-labor').textContent = pctFmt(d.labor_rate);
  document.getElementById('m-material').textContent = pctFmt(d.material_rate);

  if (avg) {
    const ld = d.labor_rate - avg.avg_labor_rate;
    document.getElementById('m-labor-diff').textContent = ld > 0 ? `평균 ${avg.avg_labor_rate}% 초과` : `평균 ${avg.avg_labor_rate}% 이내`;
    document.getElementById('m-labor-diff').className = 'metric-sub ' + (ld > 0 ? 'warn' : 'ok');

    const md = d.material_rate - avg.avg_material_rate;
    document.getElementById('m-material-diff').textContent = md > 0 ? `평균 ${avg.avg_material_rate}% 초과` : `평균 ${avg.avg_material_rate}% 이내`;
    document.getElementById('m-material-diff').className = 'metric-sub ' + (md > 0 ? 'warn' : 'ok');
  }

  // 비교 바
  const items = [
    { name:'인건비', my:d.labor_rate, avg:avg?.avg_labor_rate },
    { name:'식재료비', my:d.material_rate, avg:avg?.avg_material_rate },
    { name:'임대료', my:d.rent_rate, avg:avg?.avg_rent_rate },
    { name:'배달수수료', my:d.delivery_rate, avg:avg?.avg_delivery_rate },
    { name:'관리비', my:d.utility_rate, avg:avg?.avg_utility_rate },
    { name:'기타', my:d.other_rate, avg:avg?.avg_other_rate },
  ];

  const bars = document.getElementById('compare-bars');
  bars.innerHTML = '';
  const warns = [];

  items.forEach(item => {
    const diff = item.avg ? (item.my - item.avg) : 0;
    const scale = 50; // 최대 50%를 100%로 표시
    const myW = Math.min((item.my / scale) * 100, 100);
    const avgW = item.avg ? Math.min((item.avg / scale) * 100, 100) : 0;
    const diffClass = diff > 0 ? 'up' : diff < 0 ? 'ok' : 'same';
    const diffText = diff > 0 ? `▲ ${diff.toFixed(1)}%` : diff < 0 ? `▼ ${Math.abs(diff).toFixed(1)}%` : '평균 수준';

    if (diff > 3) warns.push(`${item.name}율이 브랜드 평균보다 ${diff.toFixed(1)}% 높아요`);

    bars.innerHTML += `
      <div class="compare-row">
        <div class="compare-meta">
          <span class="compare-name">${item.name}</span>
          <span class="compare-diff ${diffClass}">${diffText}</span>
        </div>
        <div class="bar-row">
          <div class="bar-label-small" style="color:var(--orange);font-size:9px;">내 매장</div>
          <div class="bar-track"><div class="bar-fill orange" style="width:${myW}%"></div></div>
          <div class="bar-pct" style="color:var(--orange);">${pctFmt(item.my)}</div>
        </div>
        <div class="bar-row">
          <div class="bar-label-small" style="color:var(--blue);font-size:9px;">평균</div>
          <div class="bar-track"><div class="bar-fill blue" style="width:${avgW}%"></div></div>
          <div class="bar-pct" style="color:var(--blue);">${item.avg ? pctFmt(item.avg) : '-'}</div>
        </div>
      </div>
    `;
  });

  const wb = document.getElementById('warn-box');
  if (warns.length > 0) {
    wb.classList.remove('hidden');
    wb.textContent = '⚠️ ' + warns[0];
  } else {
    wb.classList.add('hidden');
  }
}

async function loadStoreDataPage() {
  existingDataId = null;
  clearInputs();
  updateSdMode(false);
  calcProfit();
  const now = new Date();
  document.getElementById('sd-month').value = now.getMonth() + 1;
}

async function checkExisting() {
  if (!currentUser) return;
  const yr = document.getElementById('sd-year').value;
  const mo = document.getElementById('sd-month').value;
  const { data } = await sb.from('store_data')
    .select('*').eq('owner_id', currentUser.id)
    .eq('data_year', yr).eq('data_month', mo).single();

  if (data) {
    existingDataId = data.id;
    updateSdMode(true);
    fillInputs(data);
  } else {
    existingDataId = null;
    updateSdMode(false);
    clearInputs();
  }
  calcProfit();
}

function updateSdMode(isEdit) {
  const badge = document.getElementById('sd-mode-badge');
  const btn = document.getElementById('sd-save-btn');
  if (isEdit) {
    badge.textContent = '수정 중';
    badge.style.background = 'var(--blue)';
    btn.textContent = '수정 저장하기';
    btn.className = 'btn btn-blue';
  } else {
    badge.textContent = '신규 입력';
    badge.style.background = 'var(--orange)';
    btn.textContent = '저장하기';
    btn.className = 'btn btn-primary';
  }
}

function fillInputs(d) {
  document.getElementById('sd-revenue').value = d.revenue || '';
  document.getElementById('sd-labor').value = d.labor_cost || '';
  document.getElementById('sd-rent').value = d.rent || '';
  document.getElementById('sd-royalty').value = d.royalty || '';
  document.getElementById('sd-utility').value = d.utility_cost || '';
  document.getElementById('sd-material').value = d.material_cost || '';
  document.getElementById('sd-delivery').value = d.delivery_fee || '';
  document.getElementById('sd-other').value = d.other_cost || '';
}

function clearInputs() {
  ['sd-revenue','sd-labor','sd-rent','sd-royalty','sd-utility','sd-material','sd-delivery','sd-other']
    .forEach(id => document.getElementById(id).value = '');
}

function calcProfit() {
  const rev = num('sd-revenue');
  const total = num('sd-labor') + num('sd-rent') + num('sd-royalty') + num('sd-utility') +
                num('sd-material') + num('sd-delivery') + num('sd-other');
  const profit = rev - total;
  const rate = rev > 0 ? (profit / rev * 100) : 0;
  document.getElementById('sd-profit-val').textContent = numFmt(profit) + '원';
  document.getElementById('sd-profit-rate').textContent = '순수익률 ' + rate.toFixed(1) + '%';
}

async function saveStoreData() {
  if (!currentUser || !currentProfile) return;
  const yr = parseInt(document.getElementById('sd-year').value);
  const mo = parseInt(document.getElementById('sd-month').value);
  const rev = num('sd-revenue');
  if (!rev) return showAlert('sd-alert', '매출을 입력해주세요.', 'error');

  const labor = num('sd-labor'), rent = num('sd-rent'), royalty = num('sd-royalty'),
        utility = num('sd-utility'), material = num('sd-material'),
        delivery = num('sd-delivery'), other = num('sd-other');
  const total = labor + rent + royalty + utility + material + delivery + other;
  const profit = rev - total;
  const rate = v => rev > 0 ? parseFloat((v / rev * 100).toFixed(2)) : 0;

  const payload = {
    owner_id: currentUser.id,
    brand_id: currentProfile.brand_id,
    data_year: yr, data_month: mo,
    revenue: rev, labor_cost: labor, rent, royalty,
    utility_cost: utility, material_cost: material,
    delivery_fee: delivery, other_cost: other,
    net_profit: profit,
    labor_rate: rate(labor), rent_rate: rate(rent),
    material_rate: rate(material), royalty_rate: rate(royalty),
    delivery_rate: rate(delivery), utility_rate: rate(utility),
    other_rate: rate(other), net_profit_rate: rate(profit)
  };

  let err;
  if (existingDataId) {
    ({ error: err } = await sb.from('store_data').update(payload).eq('id', existingDataId));
  } else {
    ({ error: err } = await sb.from('store_data').insert(payload));
  }

  if (err) return showAlert('sd-alert', '저장에 실패했어요: ' + err.message, 'error');
  showPage('home');
}

// ===== 마이페이지 =====
async function loadMypage() {
  if (!currentProfile) return;
  document.getElementById('mp-nick').textContent = currentProfile.nickname || '-';
  document.getElementById('mp-email').textContent = currentProfile.email || '-';
  document.getElementById('mp-brand').textContent = currentBrand?.name || '-';
  document.getElementById('mp-biz').textContent = currentProfile.biz_number || '-';

  const status = currentProfile.auth_status;
  const statusEl = document.getElementById('mp-status');
  if (status === 'pending') {
    statusEl.innerHTML = '<span class="badge badge-pending">대기중</span>';
    document.getElementById('mp-pending').classList.remove('hidden');
  } else if (status === 'approved') {
    statusEl.innerHTML = '<span class="badge badge-approved">승인 완료</span>';
    document.getElementById('mp-pending').classList.add('hidden');
  } else {
    statusEl.innerHTML = '<span class="badge badge-rejected">반려</span>';
    document.getElementById('mp-rejected').classList.remove('hidden');
  }
}

// ===== 커뮤니티 =====
async function loadCommunity() {
  if (!currentProfile) return;
  document.getElementById('comm-brand-badge').textContent = (currentBrand?.name || '-') + ' 점주방';

  const { data } = await sb.from('posts')
    .select('*, profiles(nickname)')
    .eq('brand_id', currentProfile.brand_id)
    .order('created_at', { ascending: false });

  const list = document.getElementById('post-list');
  const empty = document.getElementById('comm-empty');
  list.innerHTML = '';

  if (!data || data.length === 0) {
    empty.classList.remove('hidden');
    return;
  }
  empty.classList.add('hidden');

  const colors = ['#E8790C','#378ADD','#1D9E75','#D4537E','#888780'];
  data.forEach((p, i) => {
    const color = colors[i % colors.length];
    const date = new Date(p.created_at).toLocaleDateString('ko-KR');
    list.innerHTML += `
      <div class="post-card">
        <div class="post-top">
          <div class="post-avatar" style="background:${color};">${(p.profiles?.nickname || '익명')[0]}</div>
          <div>
            <div class="post-user">익명 점주</div>
            <div class="post-brand">${currentBrand?.name || ''} · ${date}</div>
          </div>
        </div>
        <div class="post-title">${p.title}</div>
        <div class="post-preview">${p.content?.substring(0, 80)}${p.content?.length > 80 ? '...' : ''}</div>
        <div class="post-footer">
          <span class="post-stat">댓글 ${p.comment_count || 0}</span>
          <span class="post-stat">공감 ${p.like_count || 0}</span>
        </div>
      </div>
    `;
  });
}

function showWritePost() {
  document.getElementById('write-post-form').classList.remove('hidden');
}
function hideWritePost() {
  document.getElementById('write-post-form').classList.add('hidden');
  document.getElementById('post-title').value = '';
  document.getElementById('post-content').value = '';
}

async function submitPost() {
  const title = document.getElementById('post-title').value.trim();
  const content = document.getElementById('post-content').value.trim();
  if (!title || !content) return;

  await sb.from('posts').insert({
    author_id: currentUser.id,
    brand_id: currentProfile.brand_id,
    title, content, is_anonymous: true
  });
  hideWritePost();
  loadCommunity();
}

// ===== 어드민 =====
async function loadAdmin() {
  const { data: profiles } = await sb.from('profiles')
    .select('*, brands(name)').order('created_at', { ascending: false });

  if (!profiles) return;

  const pending = profiles.filter(p => p.auth_status === 'pending');
  const approved = profiles.filter(p => p.auth_status === 'approved');

  document.getElementById('admin-pending-count').textContent = `대기 ${pending.length}건`;
  document.getElementById('stat-total').textContent = profiles.length + '명';
  document.getElementById('stat-approved').textContent = approved.length + '명';
  document.getElementById('stat-pending').textContent = pending.length + '명';

  const { count } = await sb.from('store_data').select('*', { count:'exact', head:true });
  document.getElementById('stat-data').textContent = (count || 0) + '건';

  const list = document.getElementById('admin-list');
  if (pending.length === 0) {
    list.innerHTML = '<div style="text-align:center;padding:24px;color:var(--gray);font-size:13px;">대기 중인 신청이 없어요</div>';
    return;
  }
  list.innerHTML = '';
  pending.forEach(p => {
    list.innerHTML += `
      <div class="admin-row">
        <div class="admin-avatar">${(p.nickname||'?')[0]}</div>
        <div class="admin-info">
          <div class="admin-name">${p.nickname} · ${p.brands?.name || '-'}</div>
          <div class="admin-sub">${p.biz_number} · ${p.email}</div>
          ${p.biz_image ? `<div style="margin-top:4px;"><a href="${p.biz_image}" target="_blank" style="font-size:10px;color:var(--blue);">사업자등록증 보기</a></div>` : ''}
        </div>
        <div class="admin-btns">
          <button class="btn btn-sm" style="background:#D1FAE5;color:#059669;border:none;" onclick="updateStatus('${p.id}','approved')">승인</button>
          <button class="btn btn-sm" style="background:#FEE2E2;color:#DC2626;border:none;" onclick="updateStatus('${p.id}','rejected')">반려</button>
        </div>
      </div>
    `;
  });
}

async function updateStatus(userId, status) {
  await sb.from('profiles').update({ auth_status: status }).eq('id', userId);
  loadAdmin();
}

// ===== 유틸 =====
function num(id) { return parseFloat(document.getElementById(id).value) || 0; }
function numFmt(n) { return Math.round(n || 0).toLocaleString('ko-KR'); }
function pctFmt(n) { return (n || 0).toFixed(1) + '%'; }

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.innerHTML = `<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(() => el.innerHTML = '', 4000);
}

// ===== 시작 =====
init();
</script>
